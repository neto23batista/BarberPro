name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-with-more-than-forty-eight-characters-123456789
      DB_DRIVER: json
      DATA_FILE: ./data/ci-barberpro.json
      AUTO_BACKUP_ENABLED: "false"
      DEMO_AUTO_RENEW: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build
